<body>
    <div id="root" suppressHydrationWarning="true"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const StreamStatus = { IDLE: 'IDLE', CONNECTING: 'CONNECTING', PLAYING: 'PLAYING', COMPLETED: 'COMPLETED', ERROR: 'ERROR' };
        const SAMPLE_RATE = 24000;
        const SEGMENT_CHAR_SIZE = 160;
        const API_URL = '';
        const CHAR_COLORS = [
            { bg: 'rgba(45,212,191,0.15)', border: 'rgba(45,212,191,0.4)', text: '#5eead4' },
            { bg: 'rgba(245,158,11,0.15)', border: 'rgba(245,158,11,0.4)', text: '#fcd34d' },
            { bg: 'rgba(251,113,133,0.15)', border: 'rgba(251,113,133,0.4)', text: '#fda4af' },
            { bg: 'rgba(129,140,248,0.15)', border: 'rgba(129,140,248,0.4)', text: '#a5b4fc' },
        ];

        // ==========================================
        // ICONS
        // ==========================================
        const Spinner = ({ className }) => (
            <svg className={className} style={{ animation: 'spin 1s linear infinite' }} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20">
                <circle opacity="0.25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                <path opacity="0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
            </svg>
        );

        // ==========================================
        // VISUALIZER (existing)
        // ==========================================
        const Visualizer = ({ isPlaying, externalContext, externalSource }) => {
            const canvasRef = useRef(null);
            const analyserRef = useRef(null);
            const animationFrameRef = useRef(0);

            useEffect(() => {
                if (isPlaying && externalContext && externalContext.state !== 'closed') {
                    analyserRef.current = externalSource;
                }
            }, [isPlaying, externalContext, externalSource]);

            useEffect(() => {
                const renderFrame = () => {
                    const canvas = canvasRef.current;
                    const analyser = externalSource || analyserRef.current;
                    if (!canvas || !analyser) return;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) return;
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    analyser.getByteFrequencyData(dataArray);
                    const dpr = window.devicePixelRatio || 1;
                    const width = canvas.clientWidth || 600;
                    const height = canvas.clientHeight || 120;
                    canvas.width = width * dpr; canvas.height = height * dpr;
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.clearRect(0, 0, width, height);
                    const barCount = 64;
                    const step = Math.max(1, Math.floor(bufferLength / barCount));
                    const barWidth = width / barCount;
                    const maxHeight = height - 12;
                    const gradient = ctx.createLinearGradient(0, height, 0, 0);
                    gradient.addColorStop(0, 'rgba(45,212,191,0.9)');
                    gradient.addColorStop(0.55, 'rgba(245,158,11,0.9)');
                    gradient.addColorStop(1, 'rgba(251,113,133,0.85)');
                    ctx.shadowColor = 'rgba(45,212,191,0.4)'; ctx.shadowBlur = 18;
                    for (let i = 0; i < barCount; i++) {
                        const value = dataArray[i * step];
                        const barHeight = Math.max(6, (value / 255) * maxHeight);
                        const x = i * barWidth;
                        ctx.globalAlpha = 0.35 + (value / 255) * 0.65;
                        ctx.fillStyle = gradient;
                        ctx.beginPath(); ctx.roundRect(x + 1.5, height - barHeight, barWidth - 3, barHeight, 6); ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    animationFrameRef.current = requestAnimationFrame(renderFrame);
                };
                if (isPlaying) renderFrame();
                else {
                    cancelAnimationFrame(animationFrameRef.current);
                    const canvas = canvasRef.current;
                    if (canvas) { const ctx = canvas.getContext('2d'); ctx?.clearRect(0, 0, canvas.width, canvas.height); }
                }
                return () => cancelAnimationFrame(animationFrameRef.current);
            }, [isPlaying, externalSource]);

            return (
                <div className="visualizer-card h-32 flex items-end justify-center">
                    <div className="visualizer-label">Live Spectrum</div>
                    <canvas ref={canvasRef} width={600} height={100} className="w-full h-full" />
                </div>
            );
        };

        // ==========================================
        // STUDIO TAB
        // ==========================================
        const StudioTab = ({ settings, studioVoices }) => {
            const [studioMode, setStudioMode] = useState('dialogue'); // 'dialogue' or 'story'
            const [prompt, setPrompt] = useState('');
            const [script, setScript] = useState(null);
            const [voiceMap, setVoiceMap] = useState({});
            const [isGenerating, setIsGenerating] = useState(false);
            const [jobId, setJobId] = useState(null);
            const [progress, setProgress] = useState({ status: 'idle', progress: 0, current_step: '' });
            const [audioUrl, setAudioUrl] = useState(null);
            const [error, setError] = useState(null);
            const wavesurferRef = useRef(null);
            const waveContainerRef = useRef(null);
            const wsRef = useRef(null);

            // Auto-assign voices when script is generated
            const autoAssignVoices = useCallback((characters) => {
                if (!Array.isArray(characters) || characters.length === 0) return;
                const malePools = studioVoices.filter(v => ['Binh','Tuyen','Vinh'].includes(v.id));
                const femalePools = studioVoices.filter(v => ['Doan','Ly','Ngoc'].includes(v.id));
                let mi = 0, fi = 0;
                const map = {};
                characters.forEach(c => {
                    if (c.voice_id && studioVoices.find(v => v.id === c.voice_id)) {
                        map[c.name] = c.voice_id;
                    } else if (c.gender === 'M' && malePools.length > 0) {
                        map[c.name] = malePools[mi % malePools.length].id;
                        mi++;
                    } else if (c.gender === 'F' && femalePools.length > 0) {
                        map[c.name] = femalePools[fi % femalePools.length].id;
                        fi++;
                    } else if (studioVoices.length > 0) {
                        map[c.name] = studioVoices[0].id;
                    }
                });
                setVoiceMap(map);
            }, [studioVoices]);

            const handleGenerateScript = async () => {
                if (!prompt.trim()) return;
                setIsGenerating(true); setError(null); setScript(null); setAudioUrl(null);
                try {
                    const res = await fetch(`${API_URL}/studio/generate-script`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt, max_characters: settings.maxCharacters || 4, language: 'vi', mode: studioMode })
                    });
                    const data = await res.json();
                    if (res.ok && data.script) {
                        setScript(data.script);
                        autoAssignVoices(data.script.characters);
                    } else {
                        setError(data.detail || 'Failed to generate script');
                    }
                } catch (e) {
                    setError('Network error: ' + e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleProduce = async () => {
                if (!script) return;
                setError(null); setProgress({ status: 'queued', progress: 0, current_step: 'Starting...' });
                setAudioUrl(null);
                try {
                    const res = await fetch(`${API_URL}/studio/produce`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            script,
                            voice_map: voiceMap,
                            silence_gap: settings.silenceGap,
                            crossfade: settings.crossfade,
                            output_format: settings.outputFormat,
                            normalize: settings.normalize,
                            temperature: settings.temperature || 0.8,
                            top_k: settings.topK || 50,
                            speed: settings.targetDuration ? 1.0 : (settings.speed || 1.0),
                            ...(settings.targetDuration ? { target_duration_s: settings.targetDuration } : {}),
                        })
                    });
                    const data = await res.json();
                    if (res.ok && data.job_id) {
                        setJobId(data.job_id);
                        connectProgress(data.job_id);
                    } else {
                        setError(data.detail || 'Failed to start production');
                        setProgress({ status: 'idle', progress: 0, current_step: '' });
                    }
                } catch (e) {
                    setError('Network error: ' + e.message);
                    setProgress({ status: 'idle', progress: 0, current_step: '' });
                }
            };

            const pollRef = useRef(false);

            const connectProgress = (jid) => {
                if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
                pollRef.current = false;
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(`${protocol}//${window.location.host}/studio/progress/${jid}`);
                wsRef.current = ws;
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    setProgress(data);
                    if (data.status === 'complete') {
                        setAudioUrl(`${API_URL}/studio/download/${jid}`);
                        ws.close();
                    } else if (data.status === 'error') {
                        setError(data.error || 'Production failed');
                        ws.close();
                    }
                };
                ws.onerror = () => { setError('WebSocket connection failed. Falling back to polling.');
                    pollProgress(jid);
                };
            };

            const pollProgress = async (jid) => {
                pollRef.current = true;
                const poll = async () => {
                    if (!pollRef.current) return;
                    try {
                        const res = await fetch(`${API_URL}/studio/job/${jid}`);
                        const data = await res.json();
                        setProgress(data);
                        if (data.status === 'complete') {
                            setAudioUrl(`${API_URL}/studio/download/${jid}`);
                            pollRef.current = false; return;
                        } else if (data.status === 'error') {
                            setError(data.error || 'Production failed');
                            pollRef.current = false; return;
                        }
                        setTimeout(poll, 1000);
                    } catch (e) { if (pollRef.current) setTimeout(poll, 2000); }
                };
                poll();
            };

            // WaveSurfer init
            useEffect(() => {
                if (audioUrl && waveContainerRef.current) {
                    if (wavesurferRef.current) wavesurferRef.current.destroy();
                    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
                    wavesurferRef.current = WaveSurfer.create({
                        container: waveContainerRef.current,
                        waveColor: isDark ? 'rgba(45,212,191,0.5)' : 'rgba(14,165,164,0.4)',
                        progressColor: isDark ? '#2dd4bf' : '#0ea5a4',
                        cursorColor: '#f59e0b',
                        barWidth: 2, barGap: 1, barRadius: 2, height: 80, responsive: true,
                    });
                    wavesurferRef.current.load(audioUrl);
                }
                return () => { if (wavesurferRef.current) wavesurferRef.current.destroy(); };
            }, [audioUrl]);

            // Cleanup WS + poll on unmount
            useEffect(() => { return () => { if (wsRef.current) wsRef.current.close(); pollRef.current = false; }; }, []);

            const totalLines = script ? script.scenes.reduce((acc, s) => acc + s.dialogue.length, 0) : 0;
            const isProducing = progress.status === 'processing' || progress.status === 'queued';

            return (
                <div className="space-y-6">
                    {/* Mode Toggle */}
                    <div className="flex items-center gap-3">
                        {[
                            { id: 'dialogue', label: 'Video Dialogue', desc: 'Pure character conversations' },
                            { id: 'story', label: 'Story / Audiobook', desc: 'Narrator + character dialogue' },
                        ].map(m => (
                            <button key={m.id} onClick={() => setStudioMode(m.id)}
                                className={`flex-1 panel-card text-left transition-all ${studioMode === m.id
                                    ? 'border-primary-500/40 shadow-lg shadow-primary-500/10' : 'opacity-60 hover:opacity-80'}`}
                                style={studioMode === m.id ? { borderColor: 'rgba(45,212,191,0.4)' } : {}}>
                                <div className="font-semibold text-sm text-main">{m.label}</div>
                                <div className="text-xs text-muted mt-1">{m.desc}</div>
                            </button>
                        ))}
                    </div>

                    {/* Target Duration */}
                    <div className="panel-card space-y-3">
                        <div className="flex items-center justify-between">
                            <label className="label-text" style={{ marginBottom: 0 }}>Target Duration</label>
                            <span className="font-mono text-xs px-2 py-0.5 rounded-full"
                                style={{
                                    background: settings.targetDuration
                                        ? 'linear-gradient(135deg, rgba(45,212,191,0.15), rgba(245,158,11,0.15))'
                                        : 'rgba(255,255,255,0.05)',
                                    color: settings.targetDuration ? '#2dd4bf' : '#64748b',
                                    border: '1px solid ' + (settings.targetDuration ? 'rgba(45,212,191,0.3)' : 'rgba(255,255,255,0.08)'),
                                }}>
                                {settings.targetDuration
                                    ? `${Math.floor(settings.targetDuration / 60)}:${String(Math.round(settings.targetDuration % 60)).padStart(2, '0')}`
                                    : 'Auto'}
                            </span>
                        </div>
                        <div className="flex items-center gap-2 flex-wrap">
                            {[
                                { label: 'Auto', value: null },
                                { label: '30s', value: 30 },
                                { label: '1m', value: 60 },
                                { label: '2m', value: 120 },
                                { label: '5m', value: 300 },
                            ].map(p => (
                                <button key={p.label}
                                    onClick={() => updateSetting('targetDuration', p.value)}
                                    className="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all cursor-pointer"
                                    style={{
                                        background: settings.targetDuration === p.value || (!settings.targetDuration && p.value === null)
                                            ? 'linear-gradient(135deg, rgba(45,212,191,0.2), rgba(45,212,191,0.1))'
                                            : 'rgba(255,255,255,0.04)',
                                        border: '1px solid ' + (settings.targetDuration === p.value || (!settings.targetDuration && p.value === null)
                                            ? 'rgba(45,212,191,0.4)' : 'rgba(255,255,255,0.08)'),
                                        color: settings.targetDuration === p.value || (!settings.targetDuration && p.value === null)
                                            ? '#2dd4bf' : '#94a3b8',
                                        boxShadow: settings.targetDuration === p.value || (!settings.targetDuration && p.value === null)
                                            ? '0 0 12px rgba(45,212,191,0.1)' : 'none',
                                    }}>
                                    {p.label}
                                </button>
                            ))}
                            <div className="flex items-center gap-1 ml-auto">
                                <input type="number" min="1" max="600" step="1"
                                    value={settings.targetDuration || ''}
                                    placeholder="Custom"
                                    onChange={(e) => updateSetting('targetDuration',
                                        e.target.value ? Math.max(1, Math.min(600, parseFloat(e.target.value))) : null)}
                                    className="w-20 px-2 py-1.5 rounded-lg text-xs font-mono text-center transition-all"
                                    style={{
                                        background: 'rgba(255,255,255,0.04)',
                                        border: '1px solid rgba(255,255,255,0.1)',
                                        color: '#e2e8f0',
                                        outline: 'none',
                                    }}
                                    onFocus={(e) => e.target.style.borderColor = 'rgba(45,212,191,0.4)'}
                                    onBlur={(e) => e.target.style.borderColor = 'rgba(255,255,255,0.1)'}
                                />
                                <span className="text-xs text-muted">sec</span>
                            </div>
                        </div>
                        {settings.targetDuration && (
                            <div className="flex items-center gap-2 mt-1">
                                <div className="flex-1 h-1 rounded-full overflow-hidden" style={{ background: 'rgba(255,255,255,0.06)' }}>
                                    <div className="h-full rounded-full transition-all duration-500"
                                        style={{
                                            width: `${Math.min(100, (settings.targetDuration / 300) * 100)}%`,
                                            background: 'linear-gradient(90deg, #2dd4bf, #f59e0b)',
                                        }} />
                                </div>
                                <span className="text-xs text-muted whitespace-nowrap">
                                    {settings.targetDuration >= 60
                                        ? `${Math.floor(settings.targetDuration / 60)}m ${Math.round(settings.targetDuration % 60)}s`
                                        : `${settings.targetDuration}s`}
                                </span>
                            </div>
                        )}
                        <p className="text-xs" style={{ color: '#475569' }}>
                            Audio output will be adjusted to match the target length. Speed is auto-calculated.
                        </p>
                    </div>

                    {/* Prompt Input */}
                    <div className="panel-card space-y-4">
                        <label className="label-text">Production Prompt</label>
                        <div className="input-frame">
                            <textarea
                                value={prompt}
                                onChange={(e) => setPrompt(e.target.value)}
                                placeholder={studioMode === 'story'
                                    ? "Describe your story... e.g. 'Cau chuyen ve mot chang trai gap lai ban cu sau 10 nam xa cach'"
                                    : "Describe your dialogue scene... e.g. 'Cuoc hoi thoai giua hai ban ve ke hoach cuoi tuan'"}
                                className="input-area"
                                style={{ minHeight: '120px', height: '120px' }}
                                spellCheck="false"
                            />
                        </div>
                        <button
                            onClick={handleGenerateScript}
                            disabled={isGenerating || !prompt.trim() || isProducing}
                            className="btn-primary"
                        >
                            {isGenerating ? <><Spinner /> Generating Script...</> : 'Generate Script'}
                        </button>
                    </div>

                    {error && (
                        <div className="panel-card border-red-500/30" style={{ borderColor: 'rgba(248,113,133,0.4)' }}>
                            <p className="text-sm" style={{ color: '#fda4af' }}>{error}</p>
                        </div>
                    )}

                    {/* Script Editor + Voice Assignment */}
                    {script && (
                        <div className="grid gap-6 lg:grid-cols-[1fr_0.4fr]">
                            {/* Script Display */}
                            <div className="panel-card space-y-3">
                                <div className="flex items-center justify-between">
                                    <label className="label-text">Script: {script.title}</label>
                                    <span className="chip">{totalLines} lines</span>
                                </div>
                                <div className="script-editor">
                                    {script.scenes.map((scene, si) => (
                                        <div key={si}>
                                            {scene.setting && <div className="text-muted text-xs mb-2 italic">[{scene.setting}]</div>}
                                            {scene.dialogue.map((line, li) => {
                                                const isNarration = line.line_type === 'narration' || line.character === 'Narrator';
                                                const charIdx = script.characters.findIndex(c => c.name === line.character);
                                                const color = isNarration
                                                    ? { bg: 'rgba(148,163,184,0.1)', border: 'rgba(148,163,184,0.3)', text: '#94a3b8' }
                                                    : CHAR_COLORS[Math.max(0, charIdx) % CHAR_COLORS.length];
                                                return (
                                                    <div key={`${si}-${li}`} className={`mb-2 ${isNarration ? 'pl-0 italic' : 'pl-4'}`}>
                                                        <span className="char-badge" style={{
                                                            background: color.bg, border: `1px solid ${color.border}`, color: color.text
                                                        }}>
                                                            {isNarration ? 'Narrator' : line.character}
                                                        </span>
                                                        {' '}
                                                        <span className={isNarration ? 'text-muted' : 'text-main'}>{line.text}</span>
                                                        {!isNarration && line.emotion !== 'neutral' && (
                                                            <span className="text-xs text-muted ml-2">({line.emotion})</span>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Voice Assignment */}
                            <div className="space-y-4">
                                <div className="panel-card space-y-4">
                                    <label className="label-text">Voice Assignment</label>
                                    {script.characters.map((char, ci) => {
                                        const color = CHAR_COLORS[ci % CHAR_COLORS.length];
                                        return (
                                            <div key={char.name} className="space-y-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="char-badge" style={{
                                                        background: color.bg, border: `1px solid ${color.border}`, color: color.text
                                                    }}>
                                                        {char.name}
                                                    </span>
                                                    <span className="chip">{char.gender === 'M' ? 'Nam' : 'Nu'}</span>
                                                </div>
                                                <select
                                                    className="select-control"
                                                    style={{ padding: '10px 14px', fontSize: '13px' }}
                                                    value={voiceMap[char.name] || ''}
                                                    onChange={(e) => setVoiceMap(prev => ({ ...prev, [char.name]: e.target.value }))}
                                                >
                                                    {studioVoices.map(v => (
                                                        <option key={v.id} value={v.id}>{v.name || v.id}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Produce Button */}
                                <div className="panel-card space-y-4">
                                    <button
                                        onClick={handleProduce}
                                        disabled={isProducing || !script}
                                        className="btn-primary"
                                    >
                                        {isProducing ? <><Spinner /> Producing...</> : 'Produce Audio'}
                                    </button>

                                    {/* Export Script + Save to Series */}
                                    {script && (
                                        <div className="flex gap-2">
                                            <button className="btn-secondary flex-1 text-sm"
                                                onClick={() => {
                                                    const blob = new Blob([JSON.stringify({script: script, voice_map: voiceMap}, null, 2)], {type:'application/json'});
                                                    const a = document.createElement('a');
                                                    a.href = URL.createObjectURL(blob);
                                                    a.download = `script_${(script.title||'untitled').replace(/[^a-zA-Z0-9]/g,'_').slice(0,30)}.json`;
                                                    a.click(); URL.revokeObjectURL(a.href);
                                                }}>
                                                Export Script
                                            </button>
                                        </div>
                                    )}

                                    {/* Progress */}
                                    {(isProducing || progress.status === 'complete') && (
                                        <div className="space-y-2">
                                            <div className="progress-bar-bg">
                                                <div className="progress-bar-fill" style={{ width: `${progress.progress || 0}%` }} />
                                            </div>
                                            <div className="flex items-center justify-between text-xs">
                                                <span className="text-muted">{progress.current_step || ''}</span>
                                                <span className="font-mono" style={{ color: 'var(--accent-1)' }}>{progress.progress || 0}%</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Audio Player */}
                    {audioUrl && (
                        <div className="panel-card space-y-4">
                            <div className="flex items-center justify-between">
                                <label className="label-text">Output</label>
                                <div className={`status-chip status-completed`}>
                                    <span className="status-dot"></span>
                                    <span className="font-mono">Complete</span>
                                </div>
                            </div>
                            <div className="waveform-container" ref={waveContainerRef}></div>
                            <div className="flex gap-3">
                                <button
                                    onClick={() => wavesurferRef.current?.playPause()}
                                    className="btn-secondary flex-1"
                                >
                                    Play / Pause
                                </button>
                                <a href={audioUrl} download className="btn-secondary flex-1 text-center no-underline">
                                    Download
                                </a>
                            </div>
                        </div>
                    )}

                    {/* ===== Series / Audiobook Section ===== */}
                    <SeriesSection lastScript={script} lastVoiceMap={voiceMap} studioVoices={studioVoices} />
                </div>
            );
        };


        // ==========================================
        // SERIES SECTION (within Studio Tab)
        // ==========================================

        const SeriesCard = ({ series, expanded, onToggle, onContinue, onMerge, onDelete,
                              onExport, onUpdateSeries, continuing, merging, studioVoices,
                              continueHint, setContinueHint }) => {
            const totalDuration = series.episodes.reduce((sum, e) => sum + (e.duration_s || 0), 0);
            const fmtDur = (s) => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
            const [showSettings, setShowSettings] = useState(false);
            const [editingEp, setEditingEp] = useState(null); // ep_num being edited
            const [editScript, setEditScript] = useState('');
            const [reproducing, setReproducing] = useState(null);

            const startEdit = (ep) => {
                if (editingEp === ep.episode_num) { setEditingEp(null); return; }
                // Format dialogue lines as editable text
                const lines = [];
                if (ep.script_data && ep.script_data.scenes) {
                    ep.script_data.scenes.forEach(scene => {
                        scene.dialogue.forEach(d => {
                            lines.push(`[${d.character}] ${d.text}`);
                        });
                    });
                }
                setEditScript(lines.join('\n'));
                setEditingEp(ep.episode_num);
            };

            const handleReproduce = async (ep) => {
                setReproducing(ep.episode_num);
                try {
                    // Parse edited text back to script_data
                    const lines = editScript.split('\n').filter(l => l.trim());
                    const dialogue = lines.map(line => {
                        const match = line.match(/^\[([^\]]+)\]\s*(.+)/);
                        if (match) {
                            const charName = match[1];
                            const text = match[2];
                            const isNarrator = charName.toLowerCase() === 'narrator';
                            return {
                                character: charName,
                                text: text,
                                emotion: 'neutral',
                                pause_after_ms: isNarrator ? 500 : 300,
                                line_type: isNarrator ? 'narration' : 'dialogue',
                            };
                        }
                        return { character: 'Narrator', text: line, emotion: 'neutral', pause_after_ms: 500, line_type: 'narration' };
                    });

                    const newScript = {
                        ...ep.script_data,
                        scenes: [{ scene_num: 1, setting: '', dialogue }],
                    };

                    const res = await fetch(`${API_URL}/studio/series/${series.id}/episodes/${ep.episode_num}/reproduce`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ script_data: newScript })
                    });
                    if (res.ok) {
                        setEditingEp(null);
                        // Trigger parent reload
                        onUpdateSeries(series.id, {});
                    } else {
                        const err = await res.json().catch(() => ({}));
                        alert(err.detail || 'Re-produce failed');
                    }
                } catch (e) { console.error(e); alert('Network error'); }
                setReproducing(null);
            };

            const updateVoice = (charName, voiceId) => {
                const newMap = { ...series.voice_map, [charName]: voiceId };
                onUpdateSeries(series.id, { voice_map: newMap });
            };

            return (
                <div className="panel-card" style={{
                    borderLeft: '3px solid var(--accent-1)',
                    background: 'rgba(12,19,33,0.6)',
                    backdropFilter: 'blur(12px)'
                }}>
                    {/* Header */}
                    <div className="flex items-center justify-between cursor-pointer" onClick={onToggle}>
                        <div>
                            <h4 className="font-semibold" style={{color:'var(--text-1)'}}>{series.title}</h4>
                            <div className="flex gap-2 mt-1 flex-wrap">
                                <span className="chip">{series.episodes.length} eps</span>
                                <span className="chip">{fmtDur(totalDuration)}</span>
                                <span className="chip">{series.mode}</span>
                                {series.speed !== 1.0 && <span className="chip">{series.speed}x</span>}
                            </div>
                        </div>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                            className={`transition-transform ${expanded ? 'rotate-180' : ''}`}
                            style={{color:'var(--text-2)'}}>
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>

                    {expanded && (
                        <div className="mt-4 space-y-3">
                            {/* Voice Assignment */}
                            {series.characters && series.characters.length > 0 && (
                                <div className="p-3 rounded-xl space-y-2" style={{background:'var(--surface-2)', border:'1px solid var(--border)'}}>
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs font-semibold" style={{color:'var(--text-2)', textTransform:'uppercase', letterSpacing:'0.05em'}}>Voice Assignment</span>
                                    </div>
                                    {series.characters.map(c => (
                                        <div key={c.name} className="flex items-center gap-2">
                                            <span className="text-sm flex-shrink-0 w-24 truncate" style={{color:'var(--text-1)'}}>
                                                {c.name} <span style={{color:'var(--text-2)', fontSize:'0.7rem'}}>({c.gender || '?'})</span>
                                            </span>
                                            <select
                                                value={series.voice_map[c.name] || ''}
                                                onChange={e => updateVoice(c.name, e.target.value)}
                                                style={{
                                                    flex:1, padding:'0.35rem 0.5rem', borderRadius:'0.5rem',
                                                    background:'var(--bg-1)', border:'1px solid var(--border)',
                                                    color:'var(--text-1)', fontSize:'0.8rem',
                                                }}>
                                                <option value="">Auto</option>
                                                {studioVoices.map(v => (

        const SeriesSection = ({ lastScript, lastVoiceMap, studioVoices }) => {
            const [seriesList, setSeriesList] = useState([]);

            const loadSeries = () => fetch(`${API_URL}/studio/series`).then(r => r.json())

            const createSeries = async () => {

            const updateSeries = async (sid, updates) => {

            const continueSeries = async (sid) => {

                        setHints(h => ({ ...h, [sid]: '' }));

            const mergeSeries = async (sid) => {

                    const res = await fetch(`${API_URL}/studio/series/${sid}/merge`, { method: 'POST' });

                        const data = await res.json();
                        window.open(`${API_URL}${data.download_url}`, '_blank');

            const deleteSeries = async (sid) => {

            return (
                <div className="mt-8 space-y-4">

                        <div className="flex gap-2">
                            <input type="file" accept=".json" ref={importRef} onChange={importSeries}
                                style={{display:'none'}} />
                            <button className="btn-secondary text-sm px-3 py-2"
                                onClick={() => importRef.current?.click()}

                            <button className="btn-secondary text-sm px-4 py-2"
                                onClick={() => setCreating(!creating)}>
                                {creating ? 'Cancel' : '+ New Series'}
                            </button>
                        </div>
                    </div>

                    {creating && (
                        <div className="panel-card space-y-3">
                            <input placeholder="Series title" value={newTitle}
                                onChange={e => setNewTitle(e.target.value)}
                                className="input-area" style={{minHeight:'40px',height:'40px'}} />
                            <select value={newMode} onChange={e => setNewMode(e.target.value)}

                                    width:'100%', padding:'0.5rem 0.75rem', borderRadius:'0.75rem',

                    {seriesList.length === 0 ? (

            );
        };


        // ==========================================
        // SINGLE VOICE TAB (existing TTS UI)
        // ==========================================
        const SingleVoiceTab = () => {
            const [text, setText] = useState('');
            const [status, setStatus] = useState(StreamStatus.IDLE);
            const [metrics, setMetrics] = useState({ latencyMs: null, startTime: null });
            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState('');
            const [models, setModels] = useState([]);
            const [currentModel, setCurrentModel] = useState(null);
            const [isModelLoading, setIsModelLoading] = useState(false);
            const [audioBlob, setAudioBlob] = useState(null);
            const [analyserNode, setAnalyserNode] = useState(null);
            const [inputMode, setInputMode] = useState('text');
            const [urlInput, setUrlInput] = useState('');
            const [isExtracting, setIsExtracting] = useState(false);
            const [extractionMeta, setExtractionMeta] = useState(null);

            const ctxRef = useRef(null);
            const isPlayingRef = useRef(false);
            const globalAnalyserRef = useRef(null);
            const abortControllerRef = useRef(null);
            const recordedChunksRef = useRef([]);

            const fetchVoices = async (currentSelectedVoice) => {
                try {
                    const res = await fetch(`${API_URL}/voices`);
                    const data = await res.json();
                    setVoices(data);
                    if (data.length > 0 && !data.find(v => v.id === currentSelectedVoice)) {
                        setSelectedVoice(data[0].id);
                    }
                } catch (e) { console.warn("Failed to load voices", e); }
            };

            useEffect(() => {
                fetch(`${API_URL}/models`).then(r => r.json()).then(data => {
                    setModels(data);
                    const active = data.find(m => m.active);
                    if (active) setCurrentModel(active.key);
                }).catch(() => {});
                fetchVoices(selectedVoice);
            }, []);

            const handleModelChange = async (key) => {
                if (key === currentModel) return;
                setIsModelLoading(true);
                try {
                    const res = await fetch(`${API_URL}/set_model`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model_key: key })
                    });
                    const data = await res.json();
                    if (data.status === 'ok') { setCurrentModel(key); await fetchVoices(selectedVoice); }
                    else alert('Error switching model: ' + data.message);
                } catch (e) { alert('Network error switching model'); }
                finally { setIsModelLoading(false); }
            };

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            const finalizeRecording = () => {
                if (recordedChunksRef.current.length === 0) return;
                let totalLength = 0;
                for (const chunk of recordedChunksRef.current) totalLength += chunk.length;
                const buffer = new ArrayBuffer(44 + totalLength);
                const view = new DataView(buffer);
                writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + totalLength, true);
                writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, SAMPLE_RATE, true); view.setUint32(28, SAMPLE_RATE * 2, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeString(view, 36, 'data'); view.setUint32(40, totalLength, true);
                let offset = 44;
                const bytes = new Uint8Array(buffer);
                for (const chunk of recordedChunksRef.current) { bytes.set(chunk, offset); offset += chunk.length; }
                setAudioBlob(new Blob([buffer], { type: 'audio/wav' }));
            };

            const handleGenerate = async () => {
                if (!text.trim()) return;
                handleStop();
                setStatus(StreamStatus.CONNECTING);
                const sessionStartTime = Date.now();
                setMetrics({ startTime: sessionStartTime, latencyMs: null });
                setAudioBlob(null); recordedChunksRef.current = [];
                isPlayingRef.current = true;
                abortControllerRef.current = new AbortController();
                const signal = abortControllerRef.current.signal;
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContextClass({ sampleRate: SAMPLE_RATE });
                ctxRef.current = ctx;
                const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
                globalAnalyserRef.current = analyser; setAnalyserNode(analyser);
                analyser.connect(ctx.destination);

                try {
                    let response;
                    if (text.length > 2000) {
                        response = await fetch(`${API_URL}/stream`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text, voice_id: selectedVoice || undefined }), signal
                        });
                    } else {
                        const encodedText = encodeURIComponent(text);
                        const voiceParam = selectedVoice ? `&voice_id=${selectedVoice}` : '';
                        response = await fetch(`${API_URL}/stream?text=${encodedText}${voiceParam}`, { signal });
                    }
                    if (!response.body) return;
                    const reader = response.body.getReader();
                    let nextTime = ctx.currentTime + 0.1;
                    let headerSkipped = false, firstChunkPlayed = false;

                    const processStream = async () => {
                        try {
                            while (isPlayingRef.current) {
                                const { done, value } = await reader.read();
                                if (done || !isPlayingRef.current || !ctxRef.current) break;
                                let audioData = value;
                                let pcmData = audioData;
                                if (!headerSkipped) {
                                    if (audioData.length > 44) { audioData = audioData.slice(44); pcmData = audioData; headerSkipped = true; }
                                    else continue;
                                }
                                recordedChunksRef.current.push(pcmData);
                                const int16 = new Int16Array(audioData.buffer, audioData.byteOffset, audioData.byteLength / 2);
                                const float32 = new Float32Array(int16.length);
                                for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
                                const buf = ctx.createBuffer(1, float32.length, SAMPLE_RATE);
                                buf.getChannelData(0).set(float32);
                                const source = ctx.createBufferSource(); source.buffer = buf;
                                source.connect(analyser);
                                if (nextTime < ctx.currentTime) nextTime = ctx.currentTime;
                                source.start(nextTime); nextTime += buf.duration;
                                if (!firstChunkPlayed) {
                                    setMetrics(prev => ({ ...prev, latencyMs: Date.now() - sessionStartTime }));
                                    setStatus(StreamStatus.PLAYING); firstChunkPlayed = true;
                                }
                            }
                        } catch (err) { if (err.name !== 'AbortError') throw err; }
                        if (isPlayingRef.current) {
                            const remaining = nextTime - ctx.currentTime;
                            if (remaining > 0) await new Promise(r => setTimeout(r, remaining * 1000));
                            if (isPlayingRef.current) {
                                setStatus(StreamStatus.COMPLETED); finalizeRecording();
                                setTimeout(() => setStatus(StreamStatus.IDLE), 2000);
                            }
                        }
                    };
                    await processStream();
                } catch (e) {
                    if (e.name !== 'AbortError') { console.error('Stream Error', e); setStatus(StreamStatus.ERROR); }
                }
            };

            const handleStop = () => {
                isPlayingRef.current = false;
                if (abortControllerRef.current) { abortControllerRef.current.abort(); abortControllerRef.current = null; }
                if (ctxRef.current) { ctxRef.current.close(); ctxRef.current = null; }
                globalAnalyserRef.current = null; setAnalyserNode(null);
                setStatus(StreamStatus.IDLE);
            };

            const handleDownload = () => {
                if (!audioBlob) return;
                const url = URL.createObjectURL(audioBlob);
                const a = document.createElement('a'); a.href = url;
                a.download = `vieneu_tts_${Date.now()}.wav`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleExtractUrl = async () => {
                if (!urlInput.trim()) return;
                setIsExtracting(true); setExtractionMeta(null);
                try {
                    const res = await fetch(`${API_URL}/extract_url`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: urlInput.trim(), max_chars: 5000 })
                    });
                    const data = await res.json();
                    if (data.status === 'ok') {
                        setText(data.text);
                        setExtractionMeta({ title: data.title, charCount: data.char_count, truncated: data.truncated });
                        setInputMode('text');
                    } else alert('Extraction failed: ' + data.message);
                } catch (e) { alert('Network error extracting URL'); }
                finally { setIsExtracting(false); }
            };

            const charCount = text.length;
            const segmentEstimate = Math.max(1, Math.ceil(charCount / SEGMENT_CHAR_SIZE));
            const statusLabel = status === StreamStatus.IDLE ? 'READY' : status === StreamStatus.CONNECTING ? 'BUFFERING'
                : status === StreamStatus.PLAYING ? 'STREAMING' : status === StreamStatus.COMPLETED ? 'COMPLETED' : 'ERROR';
            const statusClass = status === StreamStatus.ERROR ? 'status-error' : status === StreamStatus.PLAYING ? 'status-playing'
                : status === StreamStatus.CONNECTING ? 'status-connecting' : status === StreamStatus.COMPLETED ? 'status-completed' : '';

            return (
                <div className="space-y-4">
                    {isModelLoading && (
                        <div className="fixed inset-0 bg-slate-900/80 z-50 flex flex-col items-center justify-center space-y-3 backdrop-blur-sm">
                            <Spinner className="h-10 w-10 text-primary-400" />
                            <span className="text-primary-400 font-semibold animate-pulse">Switching Model...</span>
                        </div>
                    )}
                    <div className="grid gap-6 lg:grid-cols-[1.35fr_0.65fr]">
                        <div className="space-y-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setInputMode('text')}
                                        className={`px-3 py-1 rounded-lg text-sm font-medium transition-all ${inputMode === 'text' ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30' : 'text-muted hover:text-main'}`}>
                                        Text
                                    </button>
                                    <button onClick={() => setInputMode('url')}
                                        className={`px-3 py-1 rounded-lg text-sm font-medium transition-all ${inputMode === 'url' ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30' : 'text-muted hover:text-main'}`}>
                                        URL
                                    </button>
                                </div>
                                <span className="text-xs text-muted">{charCount} chars</span>
                            </div>
                            {inputMode === 'url' && (
                                <div className="space-y-3">
                                    <div className="input-frame">

        // ==========================================

            const [cloning, setCloning] = useState(false);
            const [cloneMsg, setCloneMsg] = useState(null);
            const [customVoices, setCustomVoices] = useState([]);

            const updateSetting = (key, value) => {
                setSettings(prev => {
                    const next = { ...prev, [key]: value };
                    localStorage.setItem('studio-settings', JSON.stringify(next));
                    return next;
                });
            };

            // Load custom voices
            useEffect(() => {
                fetch(`${API_URL}/studio/clone-voice`).then(r => r.json())
                    .then(d => { if (d.custom_voices) setCustomVoices(d.custom_voices); })
                    .catch(() => {});
            }, []);

            const handleClone = async () => {
                if (!cloneFile || !cloneName.trim()) return;
                setCloning(true); setCloneMsg(null);
                const formData = new FormData();
                formData.append('file', cloneFile);
                formData.append('name', cloneName.trim());
                formData.append('text', cloneText);
                try {
                    const res = await fetch(`${API_URL}/studio/clone-voice`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (res.ok) {
                        setCloneMsg({ type: 'ok', text: data.message });
                        setCloneName(''); setCloneText(''); setCloneFile(null);
                        // Refresh list
                        const lr = await fetch(`${API_URL}/studio/clone-voice`);
                        const ld = await lr.json();
                        if (ld.custom_voices) setCustomVoices(ld.custom_voices);
                    } else {
                        setCloneMsg({ type: 'err', text: data.detail || 'Failed' });
                    }
                } catch (e) { setCloneMsg({ type: 'err', text: e.message }); }
                finally { setCloning(false); }
            };

            const handleDeleteVoice = async (id) => {
                await fetch(`${API_URL}/studio/clone-voice/${id}`, { method: 'DELETE' });
                setCustomVoices(prev => prev.filter(v => v.id !== id));
            };

            return (
                <div className="space-y-6">

                        <div className="panel-card space-y-5">

                                </div>
                                <input type="range" min="0.1" max="1.5" step="0.1" value={settings.temperature || 0.8}
                                    onChange={(e) => updateSetting('temperature', parseFloat(e.target.value))}
                                    className="w-full accent-primary-400" />
                                <p className="text-xs text-muted">Lower = stable, consistent. Higher = expressive, varied.</p>
                            </div>
                            <div className="space-y-2">
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-muted">Top-K</label>
                                    <span className="font-mono text-xs text-primary-400">{settings.topK || 50}</span>
                                </div>
                                <input type="range" min="10" max="100" step="5" value={settings.topK || 50}
                                    onChange={(e) => updateSetting('topK', parseInt(e.target.value))}
                                    className="w-full accent-primary-400" />
                                <p className="text-xs text-muted">Controls token diversity. Lower = more focused pronunciation.</p>
                            </div>
                        </div>

                        {/* LLM Config */}
                        <div className="panel-card space-y-5">
                            <label className="label-text">LLM Configuration</label>
                            <div className="space-y-3">
                                <label className="text-sm text-muted">Provider</label>
                                <div className="flex gap-3">
                                    {['claude', 'openai'].map(p => (
                                        <button key={p} onClick={() => updateSetting('llmProvider', p)}
                                            className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all ${settings.llmProvider === p
                                                ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30'
                                                : 'text-muted border border-transparent hover:text-main hover:border-[var(--border)]'}`}>
                                            {p === 'claude' ? 'Claude' : 'OpenAI'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-sm text-muted">Model Name</label>
                                <input type="text" value={settings.llmModel}
                                    onChange={(e) => updateSetting('llmModel', e.target.value)}
                                    className="select-control" placeholder="claude-sonnet-4-20250514" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-sm text-muted">Max Characters per Script</label>
                                <div className="flex items-center gap-3">
                                    {[2, 3, 4].map(n => (
                                        <button key={n} onClick={() => updateSetting('maxCharacters', n)}
                                            className={`w-10 h-10 rounded-xl text-sm font-bold transition-all ${settings.maxCharacters === n
                                                ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30'
                                                : 'text-muted border border-[var(--border)] hover:text-main'}`}>
                                            {n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid gap-6 lg:grid-cols-2">
                        {/* Audio Output */}
                        <div className="panel-card space-y-5">
                            <label className="label-text">Audio Output</label>
                            <div className="space-y-3">
                                <label className="text-sm text-muted">Format</label>
                                <div className="flex gap-3">
                                    {['wav', 'mp3'].map(f => (
                                        <button key={f} onClick={() => updateSetting('outputFormat', f)}
                                            className={`px-4 py-2 rounded-xl text-sm font-semibold uppercase transition-all ${settings.outputFormat === f
                                                ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30'
                                                : 'text-muted border border-transparent hover:text-main hover:border-[var(--border)]'}`}>
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center justify-between">
                                <label className="text-sm text-muted">Normalize Audio</label>
                                <button onClick={() => updateSetting('normalize', !settings.normalize)}
                                    className={`w-12 h-6 rounded-full transition-all ${settings.normalize ? 'bg-primary-500' : 'bg-slate-700'}`}>
                                    <div className={`w-5 h-5 rounded-full bg-white shadow transition-transform ${settings.normalize ? 'translate-x-6' : 'translate-x-0.5'}`} />
                                </button>
                            </div>
                            <div className="space-y-2">
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-muted">Silence Gap</label>
                                    <span className="font-mono text-xs text-primary-400">{(settings.silenceGap || 0.3).toFixed(1)}s</span>
                                </div>
                                <input type="range" min="0" max="2" step="0.1" value={settings.silenceGap || 0.3}
                                    onChange={(e) => updateSetting('silenceGap', parseFloat(e.target.value))}
                                    className="w-full accent-primary-400" />
                            </div>
                            <div className="space-y-2">
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-muted">Crossfade</label>
                                    <span className="font-mono text-xs text-primary-400">{(settings.crossfade || 0).toFixed(1)}s</span>
                                </div>
                                <input type="range" min="0" max="1" step="0.05" value={settings.crossfade || 0}
                                    onChange={(e) => updateSetting('crossfade', parseFloat(e.target.value))}
                                    className="w-full accent-primary-400" />
                            </div>
                            <div className={`space-y-2 ${settings.targetDuration ? 'opacity-50' : ''}`}>
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-muted">Speed</label>
                                    <span className="font-mono text-xs text-primary-400">{(settings.speed || 1.0).toFixed(1)}x</span>
                                </div>
                                <input type="range" min="0.5" max="2.0" step="0.1" value={settings.speed || 1.0}
                                    onChange={(e) => updateSetting('speed', parseFloat(e.target.value))}
                                    disabled={!!settings.targetDuration}
                                    className="w-full accent-primary-400" />
                            </div>
                            <div className="space-y-2">
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-muted">Target Duration</label>
                                    <span className="font-mono text-xs text-primary-400">
                                        {settings.targetDuration ? `${settings.targetDuration}s` : 'Auto'}
                                    </span>
                                </div>
                                <div className="flex gap-2">
                                    <input type="number" min="0.5" max="600" step="0.5"
                                        value={settings.targetDuration || ''}
                                        placeholder="Auto"
                                        onChange={(e) => updateSetting('targetDuration',
                                            e.target.value ? parseFloat(e.target.value) : null)}
                                        className="flex-1 bg-surface-2 border border-border rounded px-2 py-1 text-sm" />
                                    <button onClick={() => updateSetting('targetDuration', null)}
                                        className="px-2 py-1 text-xs bg-surface-2 border border-border rounded hover:bg-surface-3 transition-colors">
                                        Clear
                                    </button>
                                </div>
                                <p className="text-xs text-muted">
                                    Set desired output length in seconds. Overrides speed control when active.
                                </p>
                            </div>
                        </div>

                        {/* Voice Cloning */}
                        <div className="panel-card space-y-5">
                            <label className="label-text">Voice Cloning</label>
                            <p className="text-xs text-muted">Upload 3-5 second WAV recording + exact transcript to clone a voice.</p>
                            <div className="space-y-3">
                                <input type="text" value={cloneName} onChange={(e) => setCloneName(e.target.value)}
                                    className="select-control" placeholder="Voice name (e.g. my_voice)" style={{ fontSize: '13px', padding: '10px 14px' }} />
                                <input type="file" accept=".wav,.mp3,.flac,.ogg"
                                    onChange={(e) => setCloneFile(e.target.files[0])}
                                    className="select-control" style={{ fontSize: '13px', padding: '10px 14px' }} />
                                <textarea value={cloneText} onChange={(e) => setCloneText(e.target.value)}
                                    className="select-control" placeholder="Exact text spoken in the audio..."
                                    style={{ fontSize: '13px', padding: '10px 14px', minHeight: '60px', resize: 'vertical' }} />
                                <button onClick={handleClone} disabled={cloning || !cloneFile || !cloneName.trim()}
                                    className="btn-primary" style={{ fontSize: '13px', padding: '10px' }}>
                                    {cloning ? 'Cloning...' : 'Clone Voice'}
                                </button>
                                {cloneMsg && (
                                    <p className={`text-xs ${cloneMsg.type === 'ok' ? 'text-green-400' : 'text-red-400'}`}>{cloneMsg.text}</p>

                            {/* Custom voices list */}

                                        <div key={v.id} className="flex items-center justify-between py-2 border-b border-[var(--border)]">
                                            <span className="text-sm text-main">{v.id}</span>
                                            <button onClick={() => handleDeleteVoice(v.id)}
                                                className="px-2 py-1 text-xs text-red-400 border border-red-500/30 rounded-lg hover:bg-red-500/10">

                            )}
                        </div>
                    </div>
                </div>
            );
