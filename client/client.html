        // ==========================================
        // WORKFLOWS TAB — Drawflow node editor
        // ==========================================
        const WorkflowsTab = () => {
            const [workflows, setWorkflows] = useState([]);
            const [editingWf, setEditingWf] = useState(null); // workflow being edited
            const [wfName, setWfName] = useState('');
            const [wfMode, setWfMode] = useState('dialogue');
            const [wfFormat, setWfFormat] = useState('wav');
            const [wfNormalize, setWfNormalize] = useState(true);
            const [wfSilence, setWfSilence] = useState(0.3);
            const [wfCrossfade, setWfCrossfade] = useState(0.0);
            const [showEditor, setShowEditor] = useState(false);
            const [runs, setRuns] = useState([]);
            const [testText, setTestText] = useState('');
            const [testLoading, setTestLoading] = useState(false);
            const [testResult, setTestResult] = useState(null);
            const drawflowRef = useRef(null);
            const editorRef = useRef(null);

            // Load workflows
            useEffect(() => {
                fetch(`${API_URL}/studio/workflows`).then(r => r.json())
                    .then(d => { if (d.workflows) setWorkflows(d.workflows); })
                    .catch(() => {});
            }, []);

            // Init Drawflow when editor opens
            useEffect(() => {
                if (showEditor && drawflowRef.current && !editorRef.current) {
                    const ed = new Drawflow(drawflowRef.current);
                    ed.reroute = true;
                    ed.start();

                    // Add default pipeline nodes (use function to avoid Babel JSX parsing of HTML strings)
                    const makeNode = (title, label, extra) => {
                        const d = document.createElement('div');
                        const tb = document.createElement('div'); tb.className = 'title-box'; tb.textContent = title;
                        const bx = document.createElement('div'); bx.className = 'box';
                        const lb = document.createElement('div'); lb.className = 'node-label'; lb.textContent = label;
                        bx.appendChild(lb);
                        if (extra) { const ex = document.createElement('div'); ex.className = 'node-config'; ex.textContent = extra; bx.appendChild(ex); }
                        d.appendChild(tb); d.appendChild(bx);
                        return d.innerHTML;
                    };
                    const inputHtml = makeNode('Text Input', 'User text or webhook payload');
                    const scriptHtml = makeNode('Script Generator', 'LLM generates dialogue/story', 'Mode: ' + wfMode);
                    const voiceHtml = makeNode('Voice Assigner', 'Auto-assign voices by gender');
                    const ttsHtml = makeNode('TTS Producer', 'Synthesize & merge audio', 'Format: ' + wfFormat);
                    const outputHtml = makeNode('Output', 'Audio file / webhook response');

                    ed.addNode('text_input', 0, 1, 50, 120, 'text_input', {}, inputHtml);
                    ed.addNode('script_gen', 1, 1, 320, 80, 'script_gen', {}, scriptHtml);
                    ed.addNode('voice_assign', 1, 1, 590, 120, 'voice_assign', {}, voiceHtml);
                    ed.addNode('tts_produce', 1, 1, 860, 80, 'tts_produce', {}, ttsHtml);
                    ed.addNode('output', 1, 0, 1130, 120, 'output', {}, outputHtml);

                    // Connect nodes
                    ed.addConnection(1, 2, 'output_1', 'input_1');
                    ed.addConnection(2, 3, 'output_1', 'input_1');
                    ed.addConnection(3, 4, 'output_1', 'input_1');
                    ed.addConnection(4, 5, 'output_1', 'input_1');

                    // If editing, load saved editor data
                    if (editingWf && editingWf.config.editor_data && Object.keys(editingWf.config.editor_data).length > 0) {
                        try { ed.import(editingWf.config.editor_data); } catch (e) { console.warn('Failed to import editor data', e); }
                    }

                    editorRef.current = ed;
                }
                return () => {
                    if (!showEditor) { editorRef.current = null; }
                };
            }, [showEditor]);

            const handleSave = async () => {
                if (!wfName.trim()) return;
                const editorData = editorRef.current ? editorRef.current.export() : {};
                const config = {
                    name: wfName, mode: wfMode, output_format: wfFormat,
                    normalize: wfNormalize, silence_gap: wfSilence, crossfade: wfCrossfade,
                    editor_data: editorData, max_characters: 4, description: '',
                    voice_overrides: {},
                };

                const isUpdate = editingWf && editingWf.id;
                const url = isUpdate ? `${API_URL}/studio/workflows/${editingWf.id}` : `${API_URL}/studio/workflows`;
                const method = isUpdate ? 'PUT' : 'POST';

                try {
                    const res = await fetch(url, {
                        method, headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setShowEditor(false); editorRef.current = null;
                        // Refresh list
                        const listRes = await fetch(`${API_URL}/studio/workflows`);
                        const listData = await listRes.json();
                        if (listData.workflows) setWorkflows(listData.workflows);
                        setEditingWf(null); setWfName('');
                    }
                } catch (e) { console.error('Save failed', e); }
            };

            const handleDelete = async (id) => {
                await fetch(`${API_URL}/studio/workflows/${id}`, { method: 'DELETE' });
                setWorkflows(prev => prev.filter(w => w.id !== id));
            };

            const handleEdit = (wf) => {
                setEditingWf(wf);
                setWfName(wf.config.name);
                setWfMode(wf.config.mode);
                setWfFormat(wf.config.output_format);
                setWfNormalize(wf.config.normalize);
                setWfSilence(wf.config.silence_gap);
                setWfCrossfade(wf.config.crossfade);
                editorRef.current = null;
                setShowEditor(true);
            };

            const handleNew = () => {
                setEditingWf(null);
                setWfName(''); setWfMode('dialogue'); setWfFormat('wav');
                setWfNormalize(true); setWfSilence(0.3); setWfCrossfade(0.0);
                editorRef.current = null;
                setShowEditor(true);
            };

            const handleTest = async (wf) => {
                if (!testText.trim()) return;
                setTestLoading(true); setTestResult(null);
                try {
                    const res = await fetch(`${API_URL}${wf.webhook_url}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: testText }),
                    });
                    if (res.ok) {
                        const blob = await res.blob();
                        const url = URL.createObjectURL(blob);
                        setTestResult({ url, format: wf.config.output_format });
                    } else {
                        const err = await res.json();
                        setTestResult({ error: err.detail || 'Failed' });
                    }
                } catch (e) { setTestResult({ error: e.message }); }
                finally { setTestLoading(false); }
            };

            const loadRuns = async (wfId) => {
                const res = await fetch(`${API_URL}/studio/workflows/${wfId}/runs`);
                const data = await res.json();
                setRuns(data.runs || []);
            };

            if (showEditor) {
                return (
                    <div className="space-y-4">
                        <div className="flex items-center justify-between">
                            <button onClick={() => { setShowEditor(false); editorRef.current = null; }} className="btn-secondary" style={{ width: 'auto', padding: '8px 16px' }}>
                                Back
                            </button>
                            <h3 className="text-lg font-semibold text-main">{editingWf ? 'Edit Workflow' : 'New Workflow'}</h3>
                            <button onClick={handleSave} className="btn-primary" style={{ width: 'auto', padding: '8px 24px' }}>
                                Save
                            </button>
                        </div>

                        {/* Workflow Config */}
                        <div className="grid gap-4 lg:grid-cols-3">
                            <div className="panel-card space-y-3">
                                <label className="label-text">Workflow Name</label>
                                <input type="text" value={wfName} onChange={(e) => setWfName(e.target.value)}
                                    className="select-control" placeholder="My Workflow" />
                            </div>
                            <div className="panel-card space-y-3">
                                <label className="label-text">Mode</label>
                                <div className="flex gap-2">
                                    {['dialogue', 'story'].map(m => (
                                        <button key={m} onClick={() => setWfMode(m)}
                                            className={`flex-1 px-3 py-2 rounded-xl text-xs font-semibold uppercase transition-all ${wfMode === m
                                                ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30'
                                                : 'text-muted border border-[var(--border)]'}`}>
                                            {m}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="panel-card space-y-3">
                                <label className="label-text">Output</label>
                                <div className="flex gap-2">
                                    {['wav', 'mp3'].map(f => (
                                        <button key={f} onClick={() => setWfFormat(f)}
                                            className={`flex-1 px-3 py-2 rounded-xl text-xs font-semibold uppercase transition-all ${wfFormat === f
                                                ? 'bg-primary-500/20 text-primary-400 border border-primary-500/30'
                                                : 'text-muted border border-[var(--border)]'}`}>
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Drawflow Editor */}
                        <div className="panel-card" style={{ padding: '0', overflow: 'hidden' }}>
                            <div ref={drawflowRef} style={{ width: '100%', height: '400px' }}></div>
                        </div>
                        <p className="text-xs text-muted text-center">Drag nodes to rearrange. Click connections to delete. Pipeline flows left to right.</p>
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div className="flex items-center justify-between">
                        <div>
                            <h3 className="text-lg font-semibold text-main">Workflows</h3>
                            <p className="text-xs text-muted">Create pipelines with webhook URLs. Trigger via curl, cron, or any HTTP client.</p>
                        </div>
                        <button onClick={handleNew} className="btn-primary" style={{ width: 'auto', padding: '10px 20px' }}>
                            + New Workflow
                        </button>
                    </div>

                    {/* Workflow List */}
                    {workflows.length === 0 ? (
                        <div className="panel-card text-center py-12">
                            <p className="text-muted">No workflows yet. Create one to get a webhook URL.</p>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            {workflows.map(wf => (
                                <div key={wf.id} className="wf-card space-y-3">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <span className="font-semibold text-main">{wf.config.name}</span>
                                            <span className="chip">{wf.config.mode}</span>
                                            <span className="chip">{wf.config.output_format}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs text-muted">{wf.run_count} runs</span>
                                            <button onClick={() => handleEdit(wf)} className="px-3 py-1 text-xs font-semibold text-primary-400 border border-primary-500/30 rounded-lg hover:bg-primary-500/10">
                                                Edit
                                            </button>
                                            <button onClick={() => handleDelete(wf.id)} className="px-3 py-1 text-xs font-semibold text-red-400 border border-red-500/30 rounded-lg hover:bg-red-500/10">
                                                Delete
                                            </button>
                                        </div>
                                    </div>

                                    {/* Webhook URL */}
                                    <div>
                                        <label className="label-text">Webhook URL</label>
                                        <div className="wf-webhook mt-1">
                                            <span className="text-muted">POST</span>{' '}
                                            <span className="text-primary-400">{window.location.origin}{wf.webhook_url}</span>
                                        </div>
                                    </div>

                                    {/* Curl example */}
                                    <details className="text-xs">
                                        <summary className="text-muted cursor-pointer hover:text-main">curl example</summary>
                                        <pre className="wf-webhook mt-2 text-xs overflow-x-auto" style={{ whiteSpace: 'pre-wrap' }}>
{`curl -X POST ${window.location.origin}${wf.webhook_url} \\
  -H "Content-Type: application/json" \\
  -d '{"text": "your text here"}' \\
  --output output.${wf.config.output_format}`}
                                        </pre>
                                    </details>

                                    {/* Quick Test */}
                                    <details className="text-xs">
                                        <summary className="text-muted cursor-pointer hover:text-main">Quick test</summary>
                                        <div className="mt-2 space-y-2">
                                            <textarea value={testText} onChange={(e) => setTestText(e.target.value)}
                                                placeholder="Enter test text..."
                                                className="select-control" style={{ minHeight: '60px', resize: 'vertical', fontSize: '12px' }} />
                                            <button onClick={() => handleTest(wf)} disabled={testLoading || !testText.trim()}
                                                className="btn-primary" style={{ fontSize: '12px', padding: '8px' }}>
                                                {testLoading ? 'Running...' : 'Run Workflow'}
                                            </button>
                                            {testResult && testResult.url && (
                                                <div className="flex gap-2 items-center">
                                                    <audio controls src={testResult.url} style={{ height: '32px', flex: 1 }} />
                                                    <a href={testResult.url} download className="px-3 py-1 text-xs font-semibold text-primary-400 border border-primary-500/30 rounded-lg">
                                                        Download
                                                    </a>
                                                </div>
                                            )}
                                            {testResult && testResult.error && (
                                                <p className="text-red-400 text-xs">{testResult.error}</p>
                                            )}
                                        </div>
                                    </details>

                                    {/* Run History */}
                                    <details className="text-xs">
                                        <summary className="text-muted cursor-pointer hover:text-main" onClick={() => loadRuns(wf.id)}>
                                            Run history ({wf.run_count})
                                        </summary>
                                        <div className="mt-2 space-y-1">
                                            {runs.filter(r => r.workflow_id === wf.id).map(r => (
                                                <div key={r.run_id} className="flex items-center justify-between py-1 border-b border-[var(--border)]">
                                                    <span className={r.status === 'success' ? 'text-green-400' : 'text-red-400'}>{r.status}</span>
                                                    <span className="text-muted truncate max-w-[200px]">{r.input_text}</span>
                                                    <span className="text-muted">{new Date(r.started_at * 1000).toLocaleTimeString()}</span>
                                                    {r.output_url && <a href={r.output_url} className="text-primary-400">Download</a>}
                                                </div>
                                            ))}
                                            {runs.filter(r => r.workflow_id === wf.id).length === 0 && (
                                                <p className="text-muted py-2">No runs yet</p>
                                            )}
                                        </div>
                                    </details>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // APP ENTRY
        // ==========================================
        const App = () => {
            const [activeTab, setActiveTab] = useState(() => sessionStorage.getItem('studio-tab') || 'studio');
            const [theme, setTheme] = useState(() => localStorage.getItem('vietvoice-theme') || 'dark');
            const [studioVoices, setStudioVoices] = useState([]);
            const SETTINGS_DEFAULTS = {
                llmProvider: 'claude', llmModel: 'claude-sonnet-4-20250514',
                maxCharacters: 4, outputFormat: 'wav', normalize: true,
                silenceGap: 0.3, crossfade: 0.0, speed: 1.0,
                temperature: 0.8, topK: 50, targetDuration: null,
            };
            const [settings, setSettings] = useState(() => {
                try {
                    const stored = localStorage.getItem('studio-settings');
                    return stored ? { ...SETTINGS_DEFAULTS, ...JSON.parse(stored) } : SETTINGS_DEFAULTS;
                } catch (e) { return SETTINGS_DEFAULTS; }
            });

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('vietvoice-theme', theme);
            }, [theme]);

            useEffect(() => {
                sessionStorage.setItem('studio-tab', activeTab);
            }, [activeTab]);

            // Load studio voices
            useEffect(() => {
                fetch(`${API_URL}/studio/voices`)
                    .then(r => r.json())
                    .then(data => { if (data.voices) setStudioVoices(data.voices); })
                    .catch(() => {});
            }, []);

            return (
                <div className="min-h-screen w-full app-shell">
                    <div className="grid-overlay"></div>
                    <div className="ambient-orb orb-1"></div>
                    <div className="ambient-orb orb-2"></div>
                    <div className="ambient-orb orb-3"></div>

                    <div className="relative z-10 w-full max-w-7xl mx-auto px-4 py-12">
                        {/* Header */}
                        <div className="reveal space-y-4 text-center md:text-left mb-8">
                            <div className="flex flex-col md:flex-row items-center md:items-end justify-center md:justify-between gap-6">
                                <div className="flex items-center gap-4">
                                    <img src="/logo.svg" alt="VietVoice" className="w-14 h-14 rounded-2xl shadow-lg shadow-black/40" />
                                    <div>
                                        <h1 className="title-text text-4xl md:text-5xl text-main">VietVoice Studio</h1>
                                        <p className="text-sm text-muted max-w-md">
                                            Multi-character voice production & streaming TTS
                                        </p>
                                    </div>
                                </div>
                                <div className="flex flex-wrap items-center justify-center md:justify-end gap-3">
                                    <span className="chip">24 kHz</span>
                                    <span className="chip">Multi-Voice</span>
                                    <span className="chip">Studio</span>
                                    <button
                                        className={`theme-switch ${theme === 'light' ? 'is-light' : 'is-dark'}`}
                                        onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                        title="Toggle theme" aria-pressed={theme === 'light'}>
                                        <span className="icon icon-sun">{'\u2600\uFE0F'}</span>
                                        <span className="icon icon-moon">{'\uD83C\uDF19'}</span>
                                        <span className="thumb"></span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Tab Bar */}
                        <div className="reveal flex justify-center mb-8" style={{ animationDelay: '80ms' }}>
                            <div className="tab-bar">
                                {[
                                    { id: 'studio', label: 'Studio' },
                                    { id: 'workflows', label: 'Workflows' },
                                    { id: 'single', label: 'Single Voice' },
                                    { id: 'settings', label: 'Settings' },
                                ].map(tab => (
                                    <button key={tab.id}
                                        className={`tab-btn ${activeTab === tab.id ? 'active' : ''}`}
                                        onClick={() => setActiveTab(tab.id)}>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Tab Content */}
                        <div className="surface-card reveal p-8 md:p-10 relative overflow-hidden" style={{ animationDelay: '120ms' }}>
                            {activeTab === 'studio' && settings && (
                                <StudioTab settings={settings} studioVoices={studioVoices} />
                            )}
                            {activeTab === 'workflows' && <WorkflowsTab />}
                            {activeTab === 'single' && <SingleVoiceTab />}
                            {activeTab === 'settings' && settings && (
                                <SettingsTab settings={settings} setSettings={setSettings} />
                            )}
                        </div>

                        <footer className="footer-note text-center mt-10">
                            Powered by VietVoice & React
                        </footer>
                    </div>
                </div>
            );
        };

        // Fix: Chrome extensions inject nodes into body/root, causing React removeChild errors.
        // Create isolated container inside #root to prevent extension interference.
        const rootElement = document.getElementById('root');
        if (rootElement) {
            // Remove any extension-injected nodes from root
            while (rootElement.firstChild) {
                rootElement.removeChild(rootElement.firstChild);
            }
            const container = document.createElement('div');
            rootElement.appendChild(container);
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
</body>
</html>
